name: iOS Build Check

on:
  push:
    branches: 
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Application
    runs-on: macos-26
    timeout-minutes: 10

    # check before changing versions https://github.com/actions/runner-images/blob/main/images/macos/macos-26-Readme.md
    env:
      XCODE_VERSION: "26.3"
      IOS_VERSION: "26.5"
      SIMULATOR_DEVICE: "iPhone 17"
      WORKSPACE_NAME: "GCMessengerSDKSample.xcworkspace"
      SCHEME_NAME: "GCMessengerSDKSample"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1  # Shallow clone

      - name: Set Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app
          xcodebuild -version

      - name: Install CocoaPods
        working-directory: GCMessengerSDKSample
        run: |
          pod install

      - name: Build iOS App
        working-directory: GCMessengerSDKSample
        run: |
          xcodebuild clean build \
            -workspace "${{ env.WORKSPACE_NAME }}" \
            -scheme "${{ env.SCHEME_NAME }}" \
            -destination "platform=iOS Simulator,OS=${{ env.IOS_VERSION }},name=${{ env.SIMULATOR_DEVICE }}" \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO
